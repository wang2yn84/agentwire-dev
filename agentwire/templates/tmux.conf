# AgentWire recommended tmux configuration
# Install: agentwire init (or copy to ~/.tmux.conf)
# Reload: prefix + r (or: tmux source-file ~/.tmux.conf)

# ─────────────────────────────────────────────────────────────
# Core Settings
# ─────────────────────────────────────────────────────────────

# Enable mouse support — scroll through agent output, click panes, resize
set -g mouse on

# Large scrollback buffer — agent sessions produce a lot of output
set -g history-limit 50000

# Start numbering at 1 (0 is far from the other keys)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set -g renumber-windows on

# No delay after pressing Escape (important for vi-mode users)
set -s escape-time 0

# True color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ─────────────────────────────────────────────────────────────
# Copy Mode (vi-style)
# ─────────────────────────────────────────────────────────────

# Use vi keys in copy mode (prefix + [ to enter)
setw -g mode-keys vi

# v to start selection, y to yank (like vim)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Don't exit copy mode when mouse drag ends — lets you review the selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ─────────────────────────────────────────────────────────────
# Mouse Click/Drag — Disabled
# ─────────────────────────────────────────────────────────────
# Agent sessions run non-interactively. Clicking or dragging in a pane
# can accidentally enter copy mode or send input to the agent. We keep
# mouse scroll (above) but disable everything else.
#
# Tip: In iTerm2, hold Option (Alt) to bypass tmux mouse and use
# native text selection when you need it.

unbind -n MouseDown1Pane
unbind -n MouseDown1Status
unbind -n MouseDrag1Border
unbind -n MouseDrag1Pane
unbind -n DoubleClick1Pane
unbind -n TripleClick1Pane

# ─────────────────────────────────────────────────────────────
# Key Bindings
# ─────────────────────────────────────────────────────────────

# Intuitive pane splitting (prefix + | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─────────────────────────────────────────────────────────────
# Status Bar
# ─────────────────────────────────────────────────────────────
# Layout: [session] window_num    branch | ~/path | CPU:N% RAM:N% HH:MM
# Status bar at top keeps the command prompt at the bottom where you expect it.

set -g status-position top
set -g status-style bg=default,fg=white
set -g status-interval 5

# Left: session name + window numbers
set -g status-left "#[fg=green][#S]#[fg=white] "
set -g status-left-length 30
setw -g window-status-format "#I"
setw -g window-status-current-format "#[fg=cyan,bold]#I#[fg=white,nobold]"

# Right: git branch | working dir | CPU/RAM | time
# Uses platform detection (macOS vs Linux) for system metrics
set -g status-right-length 100
set -g status-right "\
#[fg=yellow]#(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null || echo '-')#[fg=white] | \
#[fg=cyan]#(echo '#{pane_current_path}' | sed \"s|$HOME|~|\")#[fg=white] | \
CPU:#(if [ $(uname) = Darwin ]; then top -l 1 -n 0 2>/dev/null | awk '/CPU usage/{print int($3)}'; else top -bn1 2>/dev/null | awk '/Cpu/{print int($2+$4)}'; fi)%% \
RAM:#(if [ $(uname) = Darwin ]; then memory_pressure 2>/dev/null | awk '/System-wide/{print int(100-$5)}'; else free 2>/dev/null | awk '/Mem:/{print int($3/$2*100)}'; fi)%% \
%H:%M"

# Active pane border
set -g pane-active-border-style fg=blue
