{% extends 'base.html' %}

{% block title %}AgentWire Desktop{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/desktop.css">
{% endblock %}

{% block content %}
<div class="desktop-container">
    <!-- Left Sidebar (click-toggle tab handle) -->
    <button class="sidebar-tab" id="sidebarTab" aria-label="Toggle sidebar" title="Toggle sidebar">
        <span class="sidebar-tab-chevron">›</span>
    </button>
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="AgentWire sidebar">
        <div class="sidebar-header">
            <div class="sidebar-status" id="connectionStatus">
                <span class="status-dot disconnected"></span>
            </div>
            <div class="sidebar-session-count" id="sessionCount">
                <span class="count">0</span> sessions
            </div>
            <div class="sidebar-clock" id="sidebarClock"></div>
            <button class="sidebar-pin" id="sidebarPin" title="Pin sidebar open" aria-label="Pin sidebar">
                <span class="sidebar-pin-icon">📌</span>
            </button>
        </div>
        <div class="sidebar-sections" id="sidebarSections">
            <div class="sidebar-section sidebar-section-open">
                <div class="sidebar-section-title">Open Windows</div>
                <div class="sidebar-open-list" id="openWindowsList"></div>
            </div>
            <!-- Phase 3: list panel accordion sections mount here -->
        </div>
        <div class="sidebar-footer">
            <button class="sidebar-ptt" id="sidebarGlobalPtt" title="Hold to talk to AgentWire (Ctrl+Space)">
                <span class="ptt-icon">🎤</span>
            </button>
            <div class="sidebar-voice-indicator" id="sidebarVoiceIndicator" title="AgentWire idle"><div class="stop-icon"></div></div>
        </div>
    </aside>

    <!-- Desktop Area -->
    <div class="desktop-area" id="desktopArea">
        <div class="desktop-wallpaper">
            <div class="logo-layers">
                <img src="/static/agentwire-splash-logo-layers--tree.png" alt="" class="logo-layer layer-tree">
                <img src="/static/agentwire-splash-logo-layers--telephone.png" alt="" class="logo-layer layer-telephone">
                <img src="/static/agentwire-splash-logo-layers--echo.png" alt="" class="logo-layer layer-owl">
                <img src="/static/agentwire-splash-logo-layers--echo-claw-fg.png" alt="" class="logo-layer layer-claw-fg">
                <img src="/static/agentwire-splash-logo-layers--agentwire-text.png" alt="" class="logo-layer layer-text">
            </div>
        </div>
    </div>

    <!-- Bottom taskbar removed in Phase 2 — open windows live in the sidebar now. -->
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/winbox.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module" src="/static/js/desktop.js"></script>
{% endblock %}
