name: Google Cloud CLI
binary: gcloud
purpose: Manage Google Cloud Platform resources — compute, storage, databases, IAM, and more
docs: https://cloud.google.com/sdk/gcloud/reference
install: brew install --cask google-cloud-sdk

commands:
  # Auth & config
  - cmd: "gcloud auth login"
    access: write
    description: Authenticate with a Google account

  - cmd: "gcloud auth list"
    access: read
    description: List credentialed accounts

  - cmd: "gcloud config list"
    access: read
    description: Show current CLI configuration

  - cmd: "gcloud config set project <project-id>"
    access: write
    description: Set the active GCP project

  # Projects
  - cmd: "gcloud projects list"
    access: read
    description: List all GCP projects

  - cmd: "gcloud projects describe <project-id>"
    access: read
    description: Show project details

  - cmd: "gcloud projects create <project-id>"
    access: write
    description: Create a new GCP project

  - cmd: "gcloud projects delete <project-id>"
    access: blocked
    description: Delete an entire GCP project and all its resources (unrecoverable)

  # Compute (VMs)
  - cmd: "gcloud compute instances list"
    access: read
    description: List VM instances

  - cmd: "gcloud compute instances describe <name>"
    access: read
    description: Show VM instance details

  - cmd: "gcloud compute instances start <name>"
    access: write
    description: Start a stopped VM instance

  - cmd: "gcloud compute instances stop <name>"
    access: write
    description: Stop a running VM instance

  - cmd: "gcloud compute instances create <name>"
    access: write
    description: Create a new VM instance

  - cmd: "gcloud compute instances delete <name>"
    access: blocked
    description: Permanently delete a VM instance

  # Cloud Storage
  - cmd: "gcloud storage ls [gs://<bucket>]"
    access: read
    description: List buckets or objects

  - cmd: "gcloud storage cp <src> <dst>"
    access: write
    description: Copy files to/from Cloud Storage

  - cmd: "gcloud storage rm gs://<bucket>/<object>"
    access: write
    description: Delete a single object

  - cmd: "gcloud storage rm -r gs://<bucket>"
    access: blocked
    description: Recursively delete all objects in a bucket

  # Cloud SQL
  - cmd: "gcloud sql instances list"
    access: read
    description: List Cloud SQL instances

  - cmd: "gcloud sql instances describe <name>"
    access: read
    description: Show Cloud SQL instance details

  - cmd: "gcloud sql instances create <name>"
    access: write
    description: Create a Cloud SQL instance

  - cmd: "gcloud sql instances delete <name>"
    access: blocked
    description: Delete a Cloud SQL instance (data loss)

  # Cloud Functions
  - cmd: "gcloud functions list"
    access: read
    description: List Cloud Functions

  - cmd: "gcloud functions describe <name>"
    access: read
    description: Show function details

  - cmd: "gcloud functions deploy <name>"
    access: write
    description: Deploy a Cloud Function

  - cmd: "gcloud functions delete <name>"
    access: blocked
    description: Delete a Cloud Function

  # IAM
  - cmd: "gcloud iam service-accounts list"
    access: read
    description: List service accounts

  - cmd: "gcloud iam service-accounts create <name>"
    access: write
    description: Create a service account

  - cmd: "gcloud iam service-accounts delete <email>"
    access: blocked
    description: Delete a service account

  # GKE
  - cmd: "gcloud container clusters list"
    access: read
    description: List GKE clusters

  - cmd: "gcloud container clusters describe <name>"
    access: read
    description: Show GKE cluster details

  - cmd: "gcloud container clusters create <name>"
    access: write
    description: Create a GKE cluster

  - cmd: "gcloud container clusters delete <name>"
    access: blocked
    description: Delete a GKE cluster and all workloads
