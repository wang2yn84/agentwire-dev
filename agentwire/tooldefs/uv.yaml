name: uv
binary: uv
purpose: Fast Python package and project manager — replaces pip, venv, pip-tools
docs: https://docs.astral.sh/uv/
install: brew install uv

commands:
  # Project management
  - cmd: "uv init [<name>]"
    access: write
    description: Initialize a new Python project

  - cmd: "uv sync"
    access: write
    description: Install dependencies from uv.lock

  - cmd: "uv add <package>"
    access: write
    description: Add a dependency

  - cmd: "uv remove <package>"
    access: write
    description: Remove a dependency

  - cmd: "uv lock"
    access: write
    description: Update uv.lock without installing

  # Running
  - cmd: "uv run <script.py>"
    access: write
    description: Run a script in project environment

  - cmd: "uv run <cmd>"
    access: write
    description: Run a command in project environment

  # Tools
  - cmd: "uv tool install <package>"
    access: write
    description: Install a CLI tool globally

  - cmd: "uv tool run <tool>"
    access: write
    description: Run a tool without installing (like uvx)

  - cmd: "uv tool list"
    access: read
    description: List installed tools

  - cmd: "uv tool uninstall <tool>"
    access: write
    description: Uninstall a tool

  # Python versions
  - cmd: "uv python list"
    access: read
    description: List available Python versions

  - cmd: "uv python install <version>"
    access: write
    description: Install a Python version

  # Build & publish
  - cmd: "uv build"
    access: write
    description: Build wheel and sdist for distribution

  - cmd: "uv publish"
    access: write
    description: Publish package to PyPI

  # Inspection
  - cmd: "uv pip list"
    access: read
    description: List installed packages in environment

  - cmd: "uv pip show <package>"
    access: read
    description: Show package details

  - cmd: "uv tree"
    access: read
    description: Show dependency tree
