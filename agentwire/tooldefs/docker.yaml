name: Docker
binary: docker
purpose: Build and run containerized applications
docs: https://docs.docker.com/reference/
install: brew install --cask docker

commands:
  # Images
  - cmd: "docker images [<name>]"
    access: read
    description: List local images

  - cmd: "docker pull <image>"
    access: write
    description: Download an image from registry

  - cmd: "docker build -t <name> ."
    access: write
    description: Build image from Dockerfile

  - cmd: "docker rmi <image>"
    access: write
    description: Remove a local image

  - cmd: "docker rmi -f <image>"
    access: blocked
    description: Force remove image (including running containers using it)

  # Containers
  - cmd: "docker ps [-a]"
    access: read
    description: List running (or all) containers

  - cmd: "docker logs <container>"
    access: read
    description: View container logs

  - cmd: "docker inspect <container>"
    access: read
    description: View detailed container info

  - cmd: "docker run <image>"
    access: write
    description: Create and start a container

  - cmd: "docker start <container>"
    access: write
    description: Start stopped container

  - cmd: "docker stop <container>"
    access: write
    description: Stop running container

  - cmd: "docker exec -it <container> <cmd>"
    access: write
    description: Execute command in running container

  - cmd: "docker rm <container>"
    access: write
    description: Remove a stopped container

  - cmd: "docker rm -f $(docker ps -aq)"
    access: blocked
    description: Force remove ALL containers

  # Volumes
  - cmd: "docker volume ls"
    access: read
    description: List volumes

  - cmd: "docker volume inspect <volume>"
    access: read
    description: View volume details

  - cmd: "docker volume rm <volume>"
    access: blocked
    description: Delete a volume (data loss)

  - cmd: "docker volume prune"
    access: blocked
    description: Delete all unused volumes (data loss)

  # Compose
  - cmd: "docker compose ps"
    access: read
    description: List compose services

  - cmd: "docker compose logs"
    access: read
    description: View compose service logs

  - cmd: "docker compose up [-d]"
    access: write
    description: Start compose services

  - cmd: "docker compose down"
    access: write
    description: Stop and remove compose containers

  - cmd: "docker compose build"
    access: write
    description: Build compose service images

  # Cleanup
  - cmd: "docker system prune"
    access: write
    description: Remove stopped containers, unused networks, dangling images

  - cmd: "docker system prune -a"
    access: blocked
    description: Remove ALL unused images, containers, networks (including named images)
