# Core damage control rules
# File system ops, path protections, process ops, history

bashToolPatterns:
  # ---------------------------------------------------------------------------
  # DESTRUCTIVE FILE OPERATIONS
  # ---------------------------------------------------------------------------
  - pattern: '\brm\s+(-[^\s]*)*-[rRf]'
    reason: rm with recursive or force flags

  - pattern: '\brm\s+-[rRf]'
    reason: rm with recursive or force flags

  - pattern: '\brm\s+--recursive'
    reason: rm with --recursive flag

  - pattern: '\brm\s+--force'
    reason: rm with --force flag

  - pattern: '\bsudo\s+rm\b'
    reason: sudo rm

  - pattern: '\brmdir\b'
    reason: rmdir (use git clean or manual cleanup)
    bypassable: true

  - pattern: '\brm\s+[^-]'
    reason: rm file deletion (use git clean or manual cleanup)
    bypassable: true

  - pattern: '(?:^|[;&|])\s*trash\s+'
    reason: trash command (moves files to trash - use git clean or manual cleanup)
    bypassable: true

  # ---------------------------------------------------------------------------
  # PERMISSION CHANGES
  # ---------------------------------------------------------------------------
  - pattern: '\bchmod\s+(-[^\s]+\s+)*777\b'
    reason: chmod 777 (world writable)

  - pattern: '\bchmod\s+-[Rr].*777'
    reason: recursive chmod 777

  - pattern: '\bchown\s+-[Rr].*\broot\b'
    reason: recursive chown to root

  # ---------------------------------------------------------------------------
  # SYSTEM-LEVEL DESTRUCTION
  # ---------------------------------------------------------------------------
  - pattern: '\bmkfs\.'
    reason: filesystem format command

  - pattern: '\bdd\s+.*of=/dev/'
    reason: dd writing to device

  # ---------------------------------------------------------------------------
  # PROCESS DESTRUCTION
  # ---------------------------------------------------------------------------
  - pattern: '\bkill\s+-9\s+-1\b'
    reason: kill all processes

  - pattern: '\bkillall\s+-9\b'
    reason: killall -9

  - pattern: '\bpkill\s+-9\b'
    reason: pkill -9

  # ---------------------------------------------------------------------------
  # HISTORY/SHELL MANIPULATION
  # ---------------------------------------------------------------------------
  - pattern: '\bhistory\s+-c\b'
    reason: clearing shell history

# ---------------------------------------------------------------------------
# ZERO ACCESS PATHS - No read, write, or any access allowed
# ---------------------------------------------------------------------------
zeroAccessPaths:
  # ---------------------------------------------------------------------------
  # ENVIRONMENT FILES (HIGH RISK - contain secrets)
  # ---------------------------------------------------------------------------
  - ".env"
  - ".env.*"
  - ".env*.local"
  - "*.env"

  # ---------------------------------------------------------------------------
  # SSH KEYS AND CONFIG
  # ---------------------------------------------------------------------------
  - "~/.ssh/"

  # ---------------------------------------------------------------------------
  # GPG KEYS
  # ---------------------------------------------------------------------------
  - "~/.gnupg/"

  # ---------------------------------------------------------------------------
  # CLOUD PROVIDER CREDENTIALS
  # ---------------------------------------------------------------------------
  # AWS
  - "~/.aws/"

  # GCP
  - "~/.config/gcloud/"
  - "*-credentials.json"
  - "*serviceAccount*.json"
  - "*service-account*.json"

  # Azure
  - "~/.azure/"

  # Kubernetes
  - "~/.kube/"
  - "kubeconfig"
  - "*-secret.yaml"
  - "secrets.yaml"

  # Docker
  - "~/.docker/"

  # ---------------------------------------------------------------------------
  # SSL/TLS CERTIFICATES AND PRIVATE KEYS
  # ---------------------------------------------------------------------------
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"

  # ---------------------------------------------------------------------------
  # TERRAFORM STATE (contains secrets in plaintext!)
  # ---------------------------------------------------------------------------
  - "*.tfstate"
  - "*.tfstate.backup"
  - ".terraform/"

  # ---------------------------------------------------------------------------
  # PLATFORM TOKENS (Vercel, Netlify, etc.)
  # ---------------------------------------------------------------------------
  - ".vercel/"
  - ".netlify/"

  # ---------------------------------------------------------------------------
  # FIREBASE/SUPABASE
  # ---------------------------------------------------------------------------
  - "firebase-adminsdk*.json"
  - "serviceAccountKey.json"
  - ".supabase/"

  # ---------------------------------------------------------------------------
  # PACKAGE MANAGER AUTH & CREDENTIALS
  # ---------------------------------------------------------------------------
  - "~/.netrc"
  - "~/.npmrc"
  - "~/.pypirc"
  - "~/.git-credentials"
  - ".git-credentials"

  # ---------------------------------------------------------------------------
  # DATABASE DUMPS (may contain production data)
  # ---------------------------------------------------------------------------
  - "dump.sql"
  - "backup.sql"
  - "*.dump"

  # ---------------------------------------------------------------------------
  # AGENTWIRE CREDENTIALS & SECRETS
  # ---------------------------------------------------------------------------
  - "~/.agentwire/credentials/"
  - "~/.agentwire/api-keys/"
  - "~/.agentwire/secrets/"
  - "~/.agentwire/tokens/"
  - "~/.agentwire/.env"
  - "~/.agentwire/*.key"
  - "~/.agentwire/*.pem"

# ---------------------------------------------------------------------------
# READ-ONLY PATHS - Can read, but not write/edit/delete
# ---------------------------------------------------------------------------
readOnlyPaths:
  # ---------------------------------------------------------------------------
  # SYSTEM DIRECTORIES
  # ---------------------------------------------------------------------------
  - /etc/
  - /usr/
  - /bin/
  - /sbin/
  - /boot/
  - /root/

  # ---------------------------------------------------------------------------
  # SHELL HISTORY FILES
  # ---------------------------------------------------------------------------
  - ~/.bash_history
  - ~/.zsh_history
  - ~/.node_repl_history

  # ---------------------------------------------------------------------------
  # SHELL CONFIG FILES
  # ---------------------------------------------------------------------------
  - ~/.bashrc
  - ~/.zshrc
  - ~/.profile
  - ~/.bash_profile

  # ---------------------------------------------------------------------------
  # LOCK FILES - Never manually edit, use package managers
  # ---------------------------------------------------------------------------
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "Gemfile.lock"
  - "poetry.lock"
  - "Pipfile.lock"
  - "composer.lock"
  - "Cargo.lock"
  - "go.sum"
  - "flake.lock"
  - "bun.lockb"
  - "uv.lock"
  - "npm-shrinkwrap.json"
  - "*.lock"
  - "*.lockb"

  # ---------------------------------------------------------------------------
  # MINIFIED/COMPILED FILES - Generated, don't edit
  # ---------------------------------------------------------------------------
  - "*.min.js"
  - "*.min.css"
  - "*.bundle.js"
  - "*.chunk.js"

  # ---------------------------------------------------------------------------
  # BUILD ARTIFACTS - Generated directories, don't edit
  # ---------------------------------------------------------------------------
  - dist/
  - build/
  - out/
  - .next/
  - .nuxt/
  - .output/
  - node_modules/
  - __pycache__/
  - .venv/
  - venv/
  - target/

# ---------------------------------------------------------------------------
# NO-DELETE PATHS - Can read/write/edit, but not delete
# ---------------------------------------------------------------------------
noDeletePaths:
  # ---------------------------------------------------------------------------
  # CLAUDE CODE CONFIGURATION
  # ---------------------------------------------------------------------------
  - ~/.claude/
  - CLAUDE.md

  # ---------------------------------------------------------------------------
  # AGENTWIRE CONFIGURATION & STATE
  # ---------------------------------------------------------------------------
  - ~/.agentwire/
  - ~/.agentwire/sessions/
  - ~/.agentwire/missions/
  - ~/.agentwire/hooks/
  - ~/.agentwire/settings.json
  - .agentwire/
  - .agentwire/mission.md
  - .agentwire/session.json

  # ---------------------------------------------------------------------------
  # LICENSE AND LEGAL FILES
  # ---------------------------------------------------------------------------
  - "LICENSE"
  - "LICENSE.*"
  - "COPYING"
  - "COPYING.*"
  - "NOTICE"
  - "PATENTS"

  # ---------------------------------------------------------------------------
  # PROJECT DOCUMENTATION
  # ---------------------------------------------------------------------------
  - "README.md"
  - "README.*"
  - "CONTRIBUTING.md"
  - "CHANGELOG.md"
  - "CODE_OF_CONDUCT.md"
  - "SECURITY.md"

  # ---------------------------------------------------------------------------
  # GIT DIRECTORY
  # ---------------------------------------------------------------------------
  - .git/
  - .gitignore
  - .gitattributes
  - .gitmodules

  # ---------------------------------------------------------------------------
  # CI/CD CONFIGURATION
  # ---------------------------------------------------------------------------
  - .github/
  - .gitlab-ci.yml
  - .circleci/
  - Jenkinsfile
  - .travis.yml
  - azure-pipelines.yml

  # ---------------------------------------------------------------------------
  # DOCKER CONFIGURATION
  # ---------------------------------------------------------------------------
  - Dockerfile
  - "Dockerfile.*"
  - docker-compose.yml
  - "docker-compose.*.yml"
  - .dockerignore

# ---------------------------------------------------------------------------
# ALLOWED PATHS - Granular bypass for path-based protections
# ---------------------------------------------------------------------------
allowedPaths:
  # ---------------------------------------------------------------------------
  # BUILD ARTIFACTS - Safe to delete/modify (regenerated by build tools)
  # ---------------------------------------------------------------------------
  - path: "*/dist/*"
    allow: all
  - path: "*/build/*"
    allow: all
  - path: "*/out/*"
    allow: all
  - path: "*/.next/*"
    allow: all
  - path: "*/.nuxt/*"
    allow: all
  - path: "*/.output/*"
    allow: all

  # ---------------------------------------------------------------------------
  # PYTHON CACHES - Safe to delete/modify
  # ---------------------------------------------------------------------------
  - path: "*/__pycache__/*"
    allow: all
  - path: "*/.eggs/*"
    allow: all
  - path: "*.egg-info/*"
    allow: all
  - path: "*/.pytest_cache/*"
    allow: all
  - path: "*/.mypy_cache/*"
    allow: all
  - path: "*/.ruff_cache/*"
    allow: all

  # ---------------------------------------------------------------------------
  # TEMP DIRECTORIES - Safe to delete/modify
  # ---------------------------------------------------------------------------
  - path: "/tmp/*"
    allow: all
  - path: "/var/tmp/*"
    allow: all

  # ---------------------------------------------------------------------------
  # PROJECT-SPECIFIC ENV FILES - Needed for tokens/config (read/write/edit only)
  # ---------------------------------------------------------------------------
  - path: "~/.agentwire/.env"
    allow: [read, write, edit]
  - path: "~/projects/agentwire-dev/.env"
    allow: [read, write, edit]
