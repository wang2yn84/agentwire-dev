tasks:
  code-quality:
    project: ~/projects/testapp
    session: testapp
    task: code-quality
    schedule:
      every: 1h
    priority: 10
    enabled: true
  doc-drift:
    project: ~/projects/testapp
    session: testapp
    task: doc-drift
    schedule:
      every: 2h
    enabled: true
    filler: true
    priority: 10
  disabled-task:
    project: ~/projects/testapp
    session: testapp
    task: disabled-task
    schedule:
      every: 30m
    enabled: false
  dep-task:
    project: ~/projects/testapp
    session: testapp
    task: dep-task
    schedule:
      after: code-quality
      delay: 30m
      cooldown: 2h
  daily-task:
    project: ~/projects/testapp
    session: testapp
    task: daily-task
    schedule:
      every: day
      at: "08:00"
      except:
        - saturday
        - sunday

state:
  code-quality:
    last_run: "2026-01-01T12:00:00"
    last_status: "complete"
    last_duration: 120
    run_count: 5
  doc-drift:
    last_run: "2026-01-01T10:00:00"
    last_status: "complete"
    last_duration: 60
    run_count: 3
