type: claude-bypass
roles:
  - agentwire
  - voice
voice: dotdev
parent: main
shell: /bin/bash

tasks:
  morning-briefing:
    shell: /bin/bash
    retries: 2
    retry_delay: 30
    idle_timeout: 30
    exit_on_complete: true
    pre:
      weather: "curl -s wttr.in/?format=3"
      calendar:
        cmd: "gcal-cli today --json"
        required: true
        validate: "jq . > /dev/null"
        timeout: 30
    prompt: |
      Weather: {{ weather }}
      Calendar: {{ calendar }}
      Summarize my day.
    on_task_end: |
      Read {{ summary_file }}.
    post:
      - "echo 'Status: {{ status }}'"
    output:
      capture: 50
      notify: voice
  simple-task:
    prompt: "Run linting checks."
