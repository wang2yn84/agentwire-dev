server:
  host: "0.0.0.0"
  port: 8765
  activity_threshold_seconds: 3

projects:
  dir: "~/projects"
  worktrees:
    enabled: true
    suffix: "-worktrees"

tts:
  backend: "none"
  default_voice: "default"

stt:
  url: "http://localhost:8100"
  timeout: 30

agent:
  command: "claude --dangerously-skip-permissions"
